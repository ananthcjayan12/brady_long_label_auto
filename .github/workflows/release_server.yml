name: Build Local Print Server

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: BradyTextAutoLabelBridge
  ARTIFACT_NAME: BradyTextAutoLabelBridge-Windows

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        working-directory: ./print-server
        run: |
          pip install -r requirements_server.txt
          pip install pyinstaller

      - name: Install Poppler (for pdf2image)
        run: |
          # Download poppler for Windows
          $popplerUrl = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip"
          Invoke-WebRequest -Uri $popplerUrl -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath C:\poppler
          # Add to PATH for this session
          $env:PATH = "C:\poppler\poppler-24.02.0\Library\bin;" + $env:PATH
          # Verify
          pdftoppm -v

      - name: Validate Required Media Assets
        shell: pwsh
        run: |
          if (!(Test-Path ".\media")) {
            throw "Missing required folder: media"
          }
          if (!(Test-Path ".\media\logo.jpeg")) {
            throw "Missing required logo: media\logo.jpeg"
          }
          Write-Host "Media assets detected."

      - name: Build EXE (Folder Mode)
        working-directory: ./print-server
        env:
          PATH: C:\poppler\poppler-24.02.0\Library\bin;${{ env.PATH }}
        run: |
          # --onedir: Create a folder (less likely to trigger antivirus)
          pyinstaller --onedir --name ${{ env.APP_NAME }} `
            --add-binary "C:\poppler\poppler-24.02.0\Library\bin\*;poppler" `
            --add-data "..\media;media" `
            --collect-submodules reportlab.graphics.barcode `
            --hidden-import reportlab.graphics.barcode.code93 `
            --hidden-import reportlab.graphics.barcode.code128 `
            --hidden-import reportlab.graphics.barcode.code39 `
            app.py

      - name: Create Zip Bundle
        working-directory: ./print-server/dist
        run: |
          Compress-Archive -Path ${{ env.APP_NAME }} -DestinationPath ${{ env.ARTIFACT_NAME }}.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./print-server/dist/${{ env.ARTIFACT_NAME }}.zip

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automated build.
            
            ## Downloads
            
            | File | Description |
            |------|-------------|
            | **${{ env.ARTIFACT_NAME }}.zip** | 🪟 **Download This** - Extract and run `${{ env.APP_NAME }}.exe` inside. No Python required. |
            
            ### How to run:
            1. Download and Extract the ZIP.
            2. Open the folder `${{ env.APP_NAME }}`.
            3. Double-click **`${{ env.APP_NAME }}.exe`**.
            4. Keep the window open.
          files: |
            ./artifacts/*.zip
          draft: false
          prerelease: false
